name: .NET build, test, and publish

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Pack Glacier.Vector
        run: dotnet pack src/Glacier.Vector/Glacier.Vector.csproj --configuration Release --output packages

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: |
          if [ -f tests/Glacier.Vector.Tests/Glacier.Vector.Tests.csproj ]; then
            dotnet test tests/Glacier.Vector.Tests/Glacier.Vector.Tests.csproj --configuration Release --no-restore --no-build
          else
            echo "No test project found at tests/Glacier.Vector.Tests/Glacier.Vector.Tests.csproj, skipping tests."
          fi

      - name: Publish to nuget.org
        if: env.NUGET_API_KEY != '' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: dotnet nuget push "packages/*.nupkg" --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: dotnet nuget push "packages/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.nupkg
          generate_release_notes: true
